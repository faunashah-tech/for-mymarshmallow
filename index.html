<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Mr. Takshil Ronak Shah</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #fff0f3; font-family: 'Arial', sans-serif; text-align: center; overflow: hidden; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 90%; max-width: 450px; }
        #main-gif { width: 220px; height: 220px; object-fit: contain; margin-bottom: 20px; border-radius: 10px; }
        h1 { color: #ff4d6d; font-size: 22px; line-height: 1.4; min-height: 60px; }
        .buttons { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 20px; }
        button { border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: all 0.3s ease; }
        #yesBtn { background-color: #28a745; color: white; padding: 15px 30px; font-size: 20px; z-index: 999; }
        #noBtn { background-color: #dc3545; color: white; padding: 10px 20px; font-size: 16px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="ask-section" class="container">
        <img id="main-gif" src="image1.gif" alt="please">
        <h1 id="questionText">Will you be my Valentine, <br>Mr. Takshil Ronak Shah? 🌹</h1>
        <div class="buttons">
            <button id="yesBtn">Yes</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <div id="success-section" class="container hidden">
        <img id="main-gif" src="image4.gif" alt="success">
        <h1>Yay! It's a date, <br>Mr. Takshil Ronak Shah! 💖</h1>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const mainGif = document.getElementById('main-gif');
        const askSection = document.getElementById('ask-section');
        const successSection = document.getElementById('success-section');

        const cheesyMessages = [
            "No", "Are you sure?", "Plese look at my eyes...", 
            "I'm gonna cry...", "You're breaking my heart!", 
            "Takshil, please don't be mean!", "I'll be so lonely...",
            "Look at the sad penguin!!", "I'm drowning in tears!",
            "Okay, now you're just teasing!", "JUST CLICK YES!"
        ];

        let clickCount = 0;

        noBtn.addEventListener('click', () => {
            clickCount++;
            
            // 1. Change Text
            if (clickCount < cheesyMessages.length) {
                noBtn.innerText = cheesyMessages[clickCount];
            } else {
                noBtn.style.display = 'none';
            }

            // 2. Change Images based on "sadness" level
            if (clickCount === 3) mainGif.src = "image2.gif"; // Sad penguin
            if (clickCount === 6) mainGif.src = "image3.png"; // Crying cat

            // 3. Make Yes button grow
            const currentSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
            yesBtn.style.fontSize = (currentSize + 15) + 'px';
            yesBtn.style.padding = (parseFloat(window.getComputedStyle(yesBtn).paddingTop) + 10) + 'px ' + 
                                   (parseFloat(window.getComputedStyle(yesBtn).paddingLeft) + 20) + 'px';
        });

        yesBtn.addEventListener('click', () => {
            askSection.classList.add('hidden');
            successSection.classList.remove('hidden');
        });
    </script>
</body>
</html>
