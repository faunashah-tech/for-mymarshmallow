<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Mr. Takshil Ronak Shah</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #fff0f3; font-family: 'Arial', sans-serif; text-align: center; overflow: hidden; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 90%; max-width: 450px; }
        #main-gif { width: 220px; margin-bottom: 20px; }
        h1 { color: #ff4d6d; font-size: 22px; line-height: 1.4; }
        .buttons { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 20px; position: relative; }
        button { border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: all 0.3s ease; }
        #yesBtn { background-color: #28a745; color: white; padding: 15px 30px; font-size: 20px; z-index: 10; }
        #noBtn { background-color: #dc3545; color: white; padding: 10px 20px; font-size: 16px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="ask-section" class="container">
        <img id="main-gif" src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExbWdtbmZidXh6YXJ6bm56Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Jm9mZj1n/c76IJL5K69Y3m/giphy.gif" alt="cute cat">
        <h1>Will you be my Valentine, <br>Mr. Takshil Ronak Shah? 🌹</h1>
        <div class="buttons">
            <button id="yesBtn">Yes</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <div id="success-section" class="container hidden">
        <img id="main-gif" src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExbWdtbmZidXh6YXJ6bm56Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Jm9mZj1n/vFKqnCdLPNOKc/giphy.gif" alt="happy cat">
        <h1>Yay! I knew you'd say yes! 💖</h1>
        <p>Can't wait to see you, Mr. Takshil Ronak Shah!</p>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const askSection = document.getElementById('ask-section');
        const successSection = document.getElementById('success-section');

        // Added more "No" stages with cheesy messages
        const cheesyMessages = [
            "No", "Are you sure?", "Really sure??", "But I'm so cute!", 
            "Think about the snacks!", "I'll be very sad...", "I'm crying now :(", 
            "You're breaking my heart!", "Takshil, please?", "I'll give you a cookie!", 
            "Is that your final answer?", "You're mean! jk lol", "Still no??", 
            "I'm not giving up!", "I can do this all day!", "Just click the green one!",
            "You're making this difficult!", "I'm losing hope...", "Okay, last chance!",
            "FINE. But I still love you.", "Actually, I disabled this button."
        ];

        let clickCount = 0;

        noBtn.addEventListener('click', () => {
            clickCount++;
            
            // Update the text to cheesy messages
            if (clickCount < cheesyMessages.length) {
                noBtn.innerText = cheesyMessages[clickCount];
            } else {
                noBtn.style.display = 'none'; // Finally hide it
            }

            // Make Yes button grow MASSIVELY
            const currentSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
            yesBtn.style.fontSize = (currentSize + 15) + 'px';
            yesBtn.style.padding = (parseFloat(window.getComputedStyle(yesBtn).paddingTop) + 10) + 'px ' + 
                                   (parseFloat(window.getComputedStyle(yesBtn).paddingLeft) + 20) + 'px';
        });

        yesBtn.addEventListener('click', () => {
            askSection.classList.add('hidden');
            successSection.classList.remove('hidden');
        });
    </script>
</body>
</html>
